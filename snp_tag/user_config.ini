; Configuración editable de parámetros tunables del pipeline Tag SNP.
; Formato recomendado por línea: clave = valor ; explicación

[General]
dir_salida_base = results ; Directorio raíz de salida de resultados

[Dataset]
; Sintético
n_snps = 1032 ; Número total de SNPs del bloque objetivo
num_bloques = 8 ; Número de bloques LD en los que se divide la secuencia sintética
prob_flip_sintetico = 0.03 ; Probabilidad de flip por SNP al generar datos sintéticos
dif_min_pares_sintetico = 100 ; Distancia Hamming mínima objetivo entre pares sintéticos
intentos_max_sintetico = 1000 ; Intentos máximos para forzar la distancia mínima sintética

[Objetivos]
modo_transformacion_objetivos = neg ; Transformación de objetivos de maximización (neg o inverse)
modo_evaluacion = proportional ; Modo de evaluación (absoluta, proportional)

[Algoritmos]
semilla_maestra = 42 ; Semilla maestra para reproducibilidad global
modo_semillas = non_deterministic ; Modo de semillas del motor evolutivo (non_deterministic o deterministic)
pc = 0.7 ; Probabilidad de cruce (crossover probability)
algoritmos_activos = NSGA2, NSGA3, SPEA2, MOEAD_TCHE, MOEAD_PBI, MOEAD_WS ; Lista de algoritmos activos a ejecutar
opciones_init = random_sparse, random_dense, greedy_ting, greedy_hybrid ; Inicializaciones activas

; Inicialización greedy_hybrid
prob_aleatoria_gi = 0.5 ; Probabilidad de bit=1 para la parte aleatoria en GI 50/50

; Inicialización greedy_ting
ratio_greedy_ting = 0.5 ; Proporcion de cromosomas generados por greedy Ting

; MOEA/D
vecinos_moead = 15 ; Número de vecinos usados por MOEA/D
prob_vecindad_moead = 0.9 ; Probabilidad de apareamiento dentro del vecindario en MOEA/D
theta_moead_pbi = 5.0 ; Parámetro theta de PBI (solo para MOEAD_PBI)

[Normalización]
modo_normalizacion = static_proportional_limits ; Modo de normalización (per_algorithm, global_all_pairs, static_dataset_limits, static_proportional_limits)

[Reporting]
report_plot_dpi = 300 ; Resolución (DPI) para figuras y reportes
