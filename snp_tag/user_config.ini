; Configuración editable de parámetros tunables del pipeline Tag SNP.
; Formato recomendado por línea: clave = valor ; explicación

[General]
dir_salida_base = results ; Directorio raíz de salida de resultados

[Dataset]
; Sintético
n_snps = 1032 ; Número total de SNPs del bloque objetivo
num_bloques = 8 ; Número de bloques LD en los que se divide la secuencia sintética
prob_flip_sintetico = 0.03 ; Probabilidad de flip por SNP al generar datos sintéticos
dif_min_pares_sintetico = 100 ; Distancia Hamming mínima objetivo entre pares sintéticos
intentos_max_sintetico = 1000 ; Intentos máximos para forzar la distancia mínima sintética

[Objetivos]
modo_transformacion_objetivos = inverse ; Transformación de objetivos de maximización (neg o inverse)
modo_evaluacion = absolute ; Modo de evaluación (absolute, proportional)
cap_tolerancia = 999999.0 ; Tope máximo biológico para la tolerancia (redundancia)

[Algoritmos]
semilla_maestra = 42 ; Semilla maestra para reproducibilidad global
modo_semillas = non_deterministic ; Modo de semillas del motor evolutivo (non_deterministic o deterministic)
modo_normalizacion = static_dataset_limits ; Modo de normalización (per_algorithm, global_all_pairs, static_dataset_limits, static_proportional_limits)
pc = 0.7 ; Probabilidad de cruce (crossover probability)
crossover_operadores_activos = UX ; Operadores de cruce activos a ejecutar [UX, HUX, 1P, 2P]
algoritmos_activos = NSGA2, NSGA3, MOEAD_TCHE ; Lista de algoritmos activos a ejecutar [NSGA2, NSGA3, SPEA2, MOEAD_TCHE, MOEAD_PBI, MOEAD_WS, AGEMOEA2, SMSEMOA, RVEA]
opciones_init = random_dense, greedy_multi ; Inicializaciones activas [random_sparse, random_dense, greedy_ting, greedy_holistic, greedy_multi]


; Inicialización greedy_ting
ratio_greedy_ting = 0.5 ; Proporcion de cromosomas generados por greedy Ting, el resto son aleatorios

; Inicialización greedy_multi
max_cobertura_objetivo = 5 ; Cobertura máxima para la construcción progresiva multiobjetivo

; Inicialización greedy_holistic
max_k_holistic = 5 ; Cobertura máxima para el barrido k-cover del Tier 2 de greedy_holistic

; MOEA/D
vecinos_moead = 15 ; Número de vecinos usados por MOEA/D
prob_vecindad_moead = 0.9 ; Probabilidad de apareamiento dentro del vecindario en MOEA/D
theta_moead_pbi = 5.0 ; Parámetro theta de PBI (solo para MOEAD_PBI)

[Reporting]
report_plot_dpi = 300 ; Resolución (DPI) para figuras y reportes
